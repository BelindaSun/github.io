<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日英语词汇 — Belinda Sun</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --serif:Georgia,'Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --cream:#FDFCFA;--warm:#F5F0E8;
  --text:#3D2A5C;--text-muted:#7A5FA0;--text-light:#B09CC8;
  --accent:#854F0B;--accent-light:#FAEEDA;
  --border:rgba(26,26,24,0.12);
}
body{font-family:var(--sans);background:var(--cream);min-height:100vh;color:var(--text);}
.page-nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:0.5px solid var(--border);background:var(--cream);position:sticky;top:0;z-index:100;}
.page-nav a{font-family:var(--serif);font-size:0.95rem;color:var(--text);text-decoration:none;}
.page-nav a:hover{color:var(--text-muted);}
.page-nav .nav-right{display:flex;gap:1.5rem;}
.page-nav .nav-right a{font-family:var(--sans);font-size:0.85rem;color:var(--text-muted);}

.container{max-width:780px;margin:0 auto;padding:2rem 1.5rem;display:grid;gap:1.5rem;}

h1{font-family:var(--serif);font-size:2rem;font-weight:normal;color:var(--text);margin-bottom:0.5rem;}
h2{font-family:var(--serif);font-size:1.2rem;font-weight:normal;color:var(--text);margin-bottom:1rem;}

.card{background:#fff;border-radius:16px;padding:1.5rem;border:0.5px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,0.04);}

.word-card{border:0.5px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:0.75rem;background:var(--warm);}
.word{font-family:var(--serif);font-size:1.6rem;font-weight:normal;color:var(--text);margin-bottom:0.4rem;}
.level{display:inline-block;padding:2px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent);font-size:0.72rem;letter-spacing:0.04em;margin-bottom:0.5rem;}
.meaning{font-size:1rem;color:var(--text);margin-bottom:0.4rem;}
.example{font-size:0.88rem;color:var(--text-muted);line-height:1.7;font-style:italic;}

.quiz-question{font-size:1rem;color:var(--text-muted);margin-bottom:0.75rem;line-height:1.7;}
.quiz-question b{color:var(--text);}

input{width:100%;padding:0.75rem 1rem;font-size:0.95rem;border-radius:8px;border:0.5px solid var(--border);background:var(--cream);color:var(--text);font-family:var(--serif);margin-bottom:0.75rem;outline:none;}
input:focus{border-color:var(--text-muted);}

.btn-row{display:flex;gap:0.75rem;flex-wrap:wrap;}
.btn-primary{padding:8px 20px;border:none;border-radius:20px;font-size:0.88rem;cursor:pointer;background:var(--text);color:var(--cream);font-family:var(--sans);}
.btn-primary:hover{opacity:0.85;}
.btn-secondary{padding:8px 20px;border:0.5px solid var(--border);border-radius:20px;font-size:0.88rem;cursor:pointer;background:none;color:var(--text-muted);font-family:var(--sans);}
.btn-secondary:hover{background:var(--warm);}

.result{margin-top:0.75rem;font-size:0.95rem;font-weight:500;min-height:1.4rem;}
.result.ok{color:#1D6A4A;}
.result.err{color:#A32D2D;}

.progress-bar{width:100%;height:8px;background:var(--warm);border-radius:999px;overflow:hidden;margin-top:1rem;}
.progress-fill{height:100%;width:0%;background:var(--text);transition:width 0.3s ease;border-radius:999px;}
.score-text{font-size:0.82rem;color:var(--text-light);margin-top:0.5rem;}

.quote{font-style:italic;color:var(--text-muted);line-height:1.8;margin-bottom:1rem;font-size:0.95rem;}
.tips ul{padding-left:1.25rem;}
.tips li{font-size:0.9rem;color:var(--text-muted);line-height:2;}
</style>
</head>
<body>

<nav class="page-nav">
  <a href="index.html">Belinda Sun</a>
  <div class="nav-right">
    <a href="tinkerland.html">🔧 Tinkerland</a>
  </div>
</nav>

<div class="container">
  <div>
    <h1>📚 每日英语词汇</h1>
    <p style="color:var(--text-muted);font-size:0.95rem;">一天几个词，慢慢把世界听懂。</p>
  </div>

  <div class="card">
    <h2>今日词汇（5个）</h2>
    <div id="wordList"></div>
  </div>

  <div class="card">
    <h2>今日挑战</h2>
    <p class="quiz-question" id="quizQuestion"></p>
    <input id="answerInput" placeholder="输入英文单词" />
    <div class="btn-row">
      <button class="btn-primary" onclick="checkAnswer()">检查答案</button>
      <button class="btn-secondary" onclick="nextQuestion()">下一题</button>
    </div>
    <div class="result" id="result"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="score-text" id="scoreText"></p>
  </div>

  <div class="card tips">
    <h2>学习建议</h2>
    <div class="quote">"背单词不是收集单词，而是让它们进入你的语言系统。"</div>
    <ul>
      <li>每天 5 个，坚持比爆肝更重要。</li>
      <li>不要只看中文意思，要读例句。</li>
      <li>大声念出来，嘴巴比眼睛更会记忆。</li>
      <li>遇到喜欢的词，尝试自己造句。</li>
      <li>重复，是词汇量真正的秘密。</li>
    </ul>
    <div style="margin-top:1rem;">
      <button class="btn-secondary" onclick="location.reload()">🔄 刷新今日词汇</button>
    </div>
  </div>
</div>

<script>
const vocabularyBank=[
  {word:"ubiquitous",meaning:"无处不在的",level:"GRE",example:"Smartphones have become ubiquitous in modern society."},
  {word:"meticulous",meaning:"一丝不苟的",level:"IELTS",example:"She kept meticulous notes during the lecture."},
  {word:"pragmatic",meaning:"务实的",level:"GMAT",example:"We need a pragmatic solution, not a perfect one."},
  {word:"resilient",meaning:"有韧性的",level:"TOEFL",example:"Children are often more resilient than adults expect."},
  {word:"eloquent",meaning:"有说服力的；雄辩的",level:"IELTS",example:"Her speech was clear, elegant, and eloquent."},
  {word:"obscure",meaning:"模糊的；鲜为人知的",level:"GRE",example:"The author referenced several obscure philosophers."},
  {word:"innovative",meaning:"创新的",level:"TOEFL",example:"The company introduced an innovative business model."},
  {word:"diligent",meaning:"勤奋的",level:"IELTS",example:"He is a diligent student who rarely misses deadlines."},
  {word:"ambiguous",meaning:"模棱两可的",level:"GRE",example:"The instructions were too ambiguous to follow."},
  {word:"compelling",meaning:"引人注目的；令人信服的",level:"GMAT",example:"She made a compelling argument for change."},
  {word:"intricate",meaning:"复杂精细的",level:"GRE",example:"The watch contained an intricate mechanical system."},
  {word:"versatile",meaning:"多才多艺的；用途广泛的",level:"TOEFL",example:"This tool is versatile enough for many tasks."},
];
function getTodayWords(){const day=new Date().getDate();const start=(day*5)%vocabularyBank.length;return vocabularyBank.slice(start,start+5).concat(vocabularyBank.slice(0,Math.max(0,start+5-vocabularyBank.length)));}
const todayWords=getTodayWords();
let quizIndex=0,score=0;
function renderWords(){
  const c=document.getElementById('wordList');c.innerHTML='';
  todayWords.forEach(item=>{
    const div=document.createElement('div');div.className='word-card';
    div.innerHTML=`<div class="word">${item.word}</div><span class="level">${item.level}</span><div class="meaning">${item.meaning}</div><div class="example">💡 ${item.example}</div>`;
    c.appendChild(div);
  });
}
function renderQuiz(){
  const current=todayWords[quizIndex];
  document.getElementById('quizQuestion').innerHTML=`哪个英文单词表示：<b>${current.meaning}</b>？`;
  document.getElementById('answerInput').value='';
  const r=document.getElementById('result');r.innerHTML='';r.className='result';
}
function checkAnswer(){
  const answer=document.getElementById('answerInput').value.trim().toLowerCase();
  const current=todayWords[quizIndex];
  const r=document.getElementById('result');
  if(answer===current.word.toLowerCase()){r.innerHTML='✅ 正确！这个词已经开始进入你的长期记忆了。';r.className='result ok';score++;}
  else{r.innerHTML=`❌ 正确答案是：<em>${current.word}</em>`;r.className='result err';}
  document.getElementById('progressFill').style.width=`${(score/todayWords.length)*100}%`;
  document.getElementById('scoreText').textContent=`今日掌握：${score}/${todayWords.length}`;
}
function nextQuestion(){quizIndex=(quizIndex+1)%todayWords.length;renderQuiz();}
renderWords();renderQuiz();
</script>
</body>
</html>
