*{box-sizing:border-box;margin:0;padding:0;}
:root{

  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --cream:#FDFCFA;--warm:#F5F0E8;
  --text:#3D2A5C;--text-muted:#7A5FA0;--text-light:#B09CC8;
  --accent:#854F0B;--accent-light:#FAEEDA;
  --border:rgba(26,26,24,0.12);
}
body{font-family:var(--sans);background:var(--cream);min-height:100vh;color:var(--text);}
.page-nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:0.5px solid var(--border);background:var(--cream);position:sticky;top:0;z-index:100;}
.page-nav a{font-family:var(--serif);font-size:0.95rem;color:var(--text);text-decoration:none;}
.page-nav a:hover{color:var(--text-muted);}
.page-nav .nav-right{display:flex;gap:1.5rem;}
.page-nav .nav-right a{font-family:var(--sans);font-size:0.85rem;color:var(--text-muted);}

.container{max-width:780px;margin:0 auto;padding:2rem 1.5rem;display:grid;gap:1.5rem;}

h1{font-family:var(--serif);font-size:2rem;font-weight:normal;color:var(--text);margin-bottom:0.5rem;}
h2{font-family:var(--serif);font-size:1.2rem;font-weight:normal;color:var(--text);margin-bottom:1rem;}

.card{background:#fff;border-radius:16px;padding:1.5rem;border:0.5px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,0.04);}

.word-card{border:0.5px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:0.75rem;background:var(--warm);}
.word{font-family:var(--serif);font-size:1.6rem;font-weight:normal;color:var(--text);margin-bottom:0.2rem;}
.pronunciation{font-family:monospace;font-size:0.8rem;color:var(--text-muted);margin-bottom:0.4rem;}
.level{display:inline-block;padding:2px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent);font-size:0.72rem;letter-spacing:0.04em;margin-bottom:0.5rem;}
.meaning{font-size:1rem;color:var(--text);margin-bottom:0.4rem;}
.example{font-size:0.88rem;color:var(--text-muted);line-height:1.7;font-style:italic;}

.quiz-question{font-size:1rem;color:var(--text-muted);margin-bottom:0.75rem;line-height:1.7;}
.quiz-question b{color:var(--text);}

input{width:100%;padding:0.75rem 1rem;font-size:0.95rem;border-radius:8px;border:0.5px solid var(--border);background:var(--cream);color:var(--text);font-family:var(--serif);margin-bottom:0.75rem;outline:none;}
input:focus{border-color:var(--text-muted);}

.btn-row{display:flex;gap:0.75rem;flex-wrap:wrap;}
.btn-primary{padding:8px 20px;border:none;border-radius:20px;font-size:0.88rem;cursor:pointer;background:var(--text);color:var(--cream);font-family:var(--sans);}
.btn-primary:hover{opacity:0.85;}
.btn-secondary{padding:8px 20px;border:0.5px solid var(--border);border-radius:20px;font-size:0.88rem;cursor:pointer;background:none;color:var(--text-muted);font-family:var(--sans);}
.btn-secondary:hover{background:var(--warm);}

.result{margin-top:0.75rem;font-size:0.95rem;font-weight:500;min-height:1.4rem;}
.result.ok{color:#1D6A4A;}
.result.err{color:#A32D2D;}

.progress-bar{width:100%;height:8px;background:var(--warm);border-radius:999px;overflow:hidden;margin-top:1rem;}
.progress-fill{height:100%;width:0%;background:var(--text);transition:width 0.3s ease;border-radius:999px;}
.score-text{font-size:0.82rem;color:var(--text-light);margin-top:0.5rem;}

.quote{font-style:italic;color:var(--text-muted);line-height:1.8;margin-bottom:1rem;font-size:0.95rem;}
.tips ul{padding-left:1.25rem;}
.tips li{font-size:0.9rem;color:var(--text-muted);line-height:2;}
.group-nav{display:flex;gap:0.75rem;align-items:center;margin-top:1rem;flex-wrap:wrap;}
</style>
</head>

  <div class="card tips">
    <h2>学习建议</h2>
    <div class="quote">"背单词不是收集单词，而是让它们进入你的语言系统。"</div>
    <ul>
      <li>每天 5 个，坚持比爆肝更重要。</li>
      <li>不要只看中文意思，要读例句。</li>
      <li>大声念出来，嘴巴比眼睛更会记忆。</li>
      <li>遇到喜欢的词，尝试自己造句。</li>
      <li>重复，是词汇量真正的秘密。</li>
    </ul>
    <div style="margin-top:1rem;">
      <button class="btn-secondary" id="legacyResetBtn">🔄 刷新今日词汇</button>
    </div>
  </div>
</div>

// ---------- 核心逻辑 ----------
const GROUP_SIZE = 5;
const TOTAL_WORDS = vocabularyBank.length;
let currentOffset = 0;
let currentWords = [];
let quizIndex = 0, score = 0;
let lastScoredIndex = null;

function getBaseStartIndex() {
  const today = new Date();
  const seed = today.getFullYear() * 365 + today.getMonth() * 31 + today.getDate();
  return (seed * 5) % TOTAL_WORDS;
}

function getWordsByOffset(offset) {
  const baseStart = getBaseStartIndex();
  let start = (baseStart + offset * GROUP_SIZE) % TOTAL_WORDS;
  const result = [];
  for (let i = 0; i < GROUP_SIZE; i++) {
    const idx = (start + i) % TOTAL_WORDS;
    result.push({ ...vocabularyBank[idx] });
  }
  return result;
}

function refresh() {
  currentWords = getWordsByOffset(currentOffset);
  if (currentWords.length === 0) return;
  quizIndex = 0;
  score = 0;
  lastScoredIndex = null;
  renderWords();
  renderQuiz();
  updateProgress();
}

function renderWords() {
  const container = document.getElementById('wordList');
  if (!container) return;
  container.innerHTML = '';
  currentWords.forEach(item => {
    const div = document.createElement('div');
    div.className = 'word-card';
    const pronHtml = item.pronunciation ? `<div class="pronunciation">/${item.pronunciation}/</div>` : '';
    div.innerHTML = `
      <div class="word">${item.word}</div>
      ${pronHtml}
      <span class="level">${item.level}</span>
      <div class="meaning">${item.meaning}</div>
      <div class="example">💡 ${item.example}</div>
    `;
    container.appendChild(div);
  });
}

function renderQuiz() {
  if (!currentWords.length) return;
  const current = currentWords[quizIndex];
  document.getElementById('quizQuestion').innerHTML = `哪个英文单词表示：<b>${current.meaning}</b>？`;
  document.getElementById('answerInput').value = '';
  document.getElementById('result').innerHTML = '';
  document.getElementById('result').className = 'result';
}

function updateProgress() {
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('scoreText');
  if (fill) fill.style.width = `${(score / GROUP_SIZE) * 100}%`;
  if (text) text.textContent = `今日掌握：${score}/${GROUP_SIZE}`;
}

function checkAnswer() {
  if (!currentWords.length) return;
  const answer = document.getElementById('answerInput').value.trim().toLowerCase();
  const current = currentWords[quizIndex];
  const resultDiv = document.getElementById('result');
  if (answer === current.word.toLowerCase()) {
    resultDiv.innerHTML = '✅ 正确！这个词已经开始进入你的长期记忆了。';
    resultDiv.className = 'result ok';
    if (lastScoredIndex !== quizIndex) {
      score++;
      lastScoredIndex = quizIndex;
      updateProgress();
    }
  } else {
    resultDiv.innerHTML = `❌ 正确答案是：<em>${current.word}</em>`;
    resultDiv.className = 'result err';
  }
}

function nextQuestion() {
  if (!currentWords.length) return;
  quizIndex = (quizIndex + 1) % GROUP_SIZE;
  lastScoredIndex = null;
  renderQuiz();
  updateProgress();
}

function nextGroup() { currentOffset++; refresh(); }
function prevGroup() { currentOffset--; refresh(); }
function resetToToday() { currentOffset = 0; refresh(); }

function bindEvents() {
  document.getElementById('checkBtn').onclick = checkAnswer;
  document.getElementById('nextBtn').onclick = nextQuestion;
  document.getElementById('prevGroupBtn').onclick = prevGroup;
  document.getElementById('nextGroupBtn').onclick = nextGroup;
  document.getElementById('resetTodayBtn').onclick = resetToToday;
  document.getElementById('legacyResetBtn').onclick = resetToToday;
}

refresh();
bindEvents();
</script>
